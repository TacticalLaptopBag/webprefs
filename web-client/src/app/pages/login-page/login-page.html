<div class="login-page-container">
  @if(signupEnabled) {
  <div class="tab-row">
    <button [class.selected]="currentTab() == 'login'" (click)="currentTab.set('login')"
      [disabled]="currentTab() == 'login'">Login</button>
    <button [class.selected]="currentTab() == 'signup'" (click)="currentTab.set('signup')"
      [disabled]="currentTab() == 'signup'">Sign up</button>
  </div>
  }
  @if(currentTab() == 'login') {
  <app-login />
  } @else if(currentTab() == 'signup') {
  <app-signup />
  }
</div>
